version: "3.9"

services:
  db:
    image: postgres:16
    container_name: adbot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: adbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - adbot_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    container_name: adbot-api
    env_file:
      - ../.env.example
    ports:
      - "8000:8000"
    depends_on:
      - db

  ui:
    build:
      context: ..
      dockerfile: infra/docker/ui.Dockerfile
    container_name: adbot-ui
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  adbot_pg_data:
